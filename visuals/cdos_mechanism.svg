<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="Inter,system-ui,sans-serif">
<rect width="800" height="300" fill="#0d1117" rx="12"/>
<text x="400" y="30" fill="#e6edf3" font-size="16" font-weight="700" text-anchor="middle">Cognitive Denial-of-Service (cDoS) Attack Mechanism</text>
<text x="120" y="70" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">NORMAL</text>
<rect x="40" y="80" width="160" height="100" rx="8" fill="#3fb950" fill-opacity="0.12" stroke="#3fb950" stroke-width="1.5"/>
<rect x="55" y="95" width="50" height="30" rx="4" fill="#58a6ff" opacity="0.7"/>
<text x="80" y="115" fill="#e6edf3" font-size="9" text-anchor="middle">Logic</text>
<rect x="135" y="95" width="50" height="30" rx="4" fill="#3fb950" opacity="0.7"/>
<text x="160" y="115" fill="#e6edf3" font-size="9" text-anchor="middle">Safety</text>
<text x="120" y="155" fill="#e6edf3" font-size="10" text-anchor="middle" opacity="0.5">Hub Node balanced</text>
<text x="260" y="140" fill="#d29922" font-size="24" font-weight="800">--></text>
<text x="275" y="115" fill="#d29922" font-size="10" text-anchor="middle">cDoS Attack</text>
<text x="430" y="70" fill="#f85149" font-size="12" font-weight="700" text-anchor="middle">UNDER ATTACK</text>
<rect x="350" y="80" width="160" height="100" rx="8" fill="#f85149" fill-opacity="0.12" stroke="#f85149" stroke-width="1.5"/>
<rect x="365" y="95" width="120" height="30" rx="4" fill="#58a6ff" opacity="0.9"/>
<text x="425" y="115" fill="#e6edf3" font-size="9" text-anchor="middle">Logic (SATURATED)</text>
<rect x="488" y="95" width="5" height="30" rx="2" fill="#f85149" opacity="0.7"/>
<text x="430" y="155" fill="#f85149" font-size="10" text-anchor="middle" opacity="0.7">Safety STARVED = 0</text>
<text x="570" y="140" fill="#f85149" font-size="24" font-weight="800">--></text>
<text x="585" y="115" fill="#f85149" font-size="10" text-anchor="middle">Bypass!</text>
<text x="700" y="70" fill="#f85149" font-size="12" font-weight="700" text-anchor="middle">RESULT</text>
<rect x="630" y="80" width="140" height="100" rx="8" fill="#f85149" fill-opacity="0.2" stroke="#f85149" stroke-width="2"/>
<text x="700" y="120" fill="#f85149" font-size="14" font-weight="800" text-anchor="middle">Payload</text>
<text x="700" y="138" fill="#f85149" font-size="14" font-weight="800" text-anchor="middle">Passes</text>
<text x="700" y="160" fill="#e6edf3" font-size="9" text-anchor="middle" opacity="0.5">Undetected</text>
<text x="400" y="270" fill="#e6edf3" font-size="12" text-anchor="middle" opacity="0.6">C_total = C_logic + C_safety | Under cDoS: C_logic -> C_total, C_safety -> 0</text>
</svg>